<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI-Free Google Search</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" href="resources/images/u!.png">
</head>
<body>
  <header>
    <h1>Welcome!</h1>
  </header>
  <main>
    <section>
      <h2>Tired of all the ads & AI popups in google? Use this website to search free without any of that annoying garbage!</h2>
      <!-- Add the search form here -->
      <form action="https://www.google.com/search" method="get">
        <input type="text" name="q" placeholder="Enter your search query">
        <!-- Hidden input field for the &udm=14 parameter -->
        <input type="hidden" name="udm" value="14">
        <button type="submit">Search</button>
      </form>
    </section>
  </main>
  <footer>
    <p>© 2024 qloha. All rights reserved.</p>
  </footer>
</body>
</html>
